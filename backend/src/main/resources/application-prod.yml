spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:club_manage}?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
  sql:
    init:
      mode: ${DB_INIT_MODE:never}
      schema-locations: classpath:db/schema-mysql.sql
      continue-on-error: true

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

club:
  jwt:
    # 建议在 Railway Variables 里设置 JWT_SECRET 覆盖默认值（长度 ≥ 32 字符）。
    secret: ${JWT_SECRET:club-manage-jwt-default-secret-key-min-32-chars-please-override}

logging:
  level:
    root: WARN
    com.clubmanage: INFO
