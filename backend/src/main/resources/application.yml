server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: club-manage-backend
  datasource:
    url: jdbc:mysql://localhost:3306/club_manage?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

club:
  jwt:
    secret: ${JWT_SECRET:club-manage-jwt-secret-key-min-256-bits-for-hs256-algorithm-change-in-prod}
    expiration-ms: 86400000
  checkin:
    default-radius-meters: 200

logging:
  level:
    com.clubmanage: debug