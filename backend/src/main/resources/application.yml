spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  application:
    name: club-manage-backend

server:
  port: 8080

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

club:
  jwt:
    # 建议在 Railway / 环境变量中设置 JWT_SECRET 覆盖此默认值（长度 ≥ 32 字符）。
    secret: ${JWT_SECRET:club-manage-jwt-default-secret-key-min-32-chars-please-override-in-prod}
    expiration-ms: 86400000
  checkin:
    default-radius-meters: 200
