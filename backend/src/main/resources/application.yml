spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  application:
    name: club-manage-backend
  datasource:
    # 默认为 SQLite。dev profile 会覆盖为带日期参数的 URL；prod 覆盖为 MySQL。
    # 这里的默认值确保 Railway 即使没设 SPRING_PROFILES_ACTIVE 也能正常启动。
    url: jdbc:sqlite:./data/club_manage.db?date_class=TEXT&date_string_format=yyyy-MM-dd HH:mm:ss
    driver-class-name: org.sqlite.JDBC
  sql:
    init:
      mode: ${DB_INIT_MODE:always}
      schema-locations: classpath:db/schema.sql
      # SQLite 下 DATETIME DEFAULT CURRENT_TIMESTAMP 有时会触发 "SQL error or missing database"，
      # 加 continue-on-error 避免初始化脚本因偶发问题失败
      continue-on-error: true

server:
  port: 8080

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

club:
  # 调试：接口返回 500 时把异常详情附在 data 里，便于排查。
  # 确认登录注册稳定后可改为 false。
  debug-exception: true
  jwt:
    # 建议在 Railway / 环境变量中设置 JWT_SECRET 覆盖此默认值（长度 ≥ 32 字符）。
    secret: ${JWT_SECRET:club-manage-jwt-default-secret-key-min-32-chars-please-override-in-prod}
    expiration-ms: 86400000
  checkin:
    default-radius-meters: 200
