spring:
  datasource:
    # date_class=TEXT + date_string_format：让 SQLite 把 DATETIME 列以字符串交付给 MyBatis-Plus，
    # 避免默认的 rs.getTimestamp 解析失败（"Error parsing time stamp"）。
    url: jdbc:sqlite:./data/club_manage.db?date_class=TEXT&date_string_format=yyyy-MM-dd HH:mm:ss
    driver-class-name: org.sqlite.JDBC
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

club:
  db-type: sqlite
  jwt:
    secret: ${JWT_SECRET:club-manage-jwt-secret-key-min-256-bits-for-hs256-algorithm-dev}

logging:
  level:
    com.clubmanage: debug
