# 开发环境配置 (SQLite)
server:
  port: 8080

spring:
  application:
    name: club-manage-backend
  datasource:
    # date_class=TEXT + date_string_format：让 SQLite 把 DATETIME 列以字符串交付给 MyBatis-Plus，
    # 避免默认的 rs.getTimestamp 解析失败（"Error parsing time stamp"）。
    url: jdbc:sqlite:./data/club_manage.db?date_class=TEXT&date_string_format=yyyy-MM-dd HH:mm:ss
    driver-class-name: org.sqlite.JDBC
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

club:
  jwt:
    secret: ${JWT_SECRET:club-manage-jwt-secret-key-min-256-bits-for-hs256-algorithm-change-in-prod}
    expiration-ms: 86400000
  checkin:
    default-radius-meters: 200

logging:
  level:
    com.clubmanage: debug
