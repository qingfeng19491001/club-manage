# 生产环境配置 (MySQL)
server:
  port: 8080

spring:
  application:
    name: club-manage-backend
  datasource:
    url: jdbc:mysql://${DB_HOST:mysql}:${DB_PORT:3306}/${DB_NAME:club_manage}?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
  sql:
    init:
      mode: ${DB_INIT_MODE:never}
      schema-locations: classpath:db/schema.sql
      continue-on-error: true

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

club:
  jwt:
    secret: ${JWT_SECRET:}
    expiration-ms: 86400000
  checkin:
    default-radius-meters: 200

logging:
  level:
    root: WARN
    com.clubmanage: INFO
